<touchégg>
  <settings>
    <property name="animation_delay">150</property>
    <property name="action_threshold">20</property>
    <property name="swipe_fingers_min_distance">30</property>
  </settings>
  <application name="All">
    <!-- 3-finger swipe left to go to next workspace -->
    <gesture type="SWIPE" fingers="3" direction="LEFT">
      <action type="SEND_KEYS">
        <modifiers>Super_L</modifiers>
        <keys>Right</keys>
        <repeat>false</repeat>
        <animation>NONE</animation>
        <on>begin</on>
      </action>
    </gesture>
    <!-- 3-finger swipe right to go to previous workspace -->
    <gesture type="SWIPE" fingers="3" direction="RIGHT">
      <action type="SEND_KEYS">
        <modifiers>Super_L</modifiers>
        <keys>Left</keys>
        <repeat>false</repeat>
        <animation>NONE</animation>
        <on>begin</on>
      </action>
    </gesture>
  </application>
</touchégg>
