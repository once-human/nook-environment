# Nook Shell - Keybindings
# Symmetrical ergonomic shortcuts from the daily-driver configuration.
# Fully Hyprland-native; does not assume Quickshell runtime.

# --- Default Applications ---
$terminal = kitty
$browser = google-chrome-stable || zen-browser || firefox || brave || xdg-open https://google.com
$fileManager = dolphin || nautilus || nemo || thunar || yazi

# Launcher: Summon Wofi styled with Nook warm paper aesthetics
bindr = SUPER, SUPER_L, exec, pkill wofi || wofi --show drun --conf ~/.config/nook/wofi/config --style ~/.config/nook/wofi/style.css
bind = SUPER, SPACE, exec, pkill wofi || wofi --show drun --conf ~/.config/nook/wofi/config --style ~/.config/nook/wofi/style.css
bind = ALT, SPACE, exec, pkill wofi || wofi --show drun --conf ~/.config/nook/wofi/config --style ~/.config/nook/wofi/style.css
bind = CTRL, SPACE, exec, pkill wofi || wofi --show drun --conf ~/.config/nook/wofi/config --style ~/.config/nook/wofi/style.css

# Overview: Super+Tab or 3-finger swipe up to toggle full-screen workspace map
bind = SUPER, TAB, exec, qs ipc call nook toggleOverview
bind = , swipe:3:u, exec, qs ipc call nook toggleOverview

# --- 2. Standard Application Launchers ---
bind = SUPER, RETURN, exec, $terminal
bind = SUPER, T, exec, $terminal
bind = SUPER, W, exec, ~/.config/nook/scripts/wallpaper-chooser.sh
bind = SUPER, E, exec, $fileManager

# --- 3. Window Focus & Movement ---
# Vim-style focus movement
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

# Arrow-key focus movement
bind = SUPER, Left, movefocus, l
bind = SUPER, Right, movefocus, r
bind = SUPER, Up, movefocus, u
bind = SUPER, Down, movefocus, d

# Vim-style window physical movement
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, J, movewindow, d

# Arrow-key window physical movement
bind = SUPER SHIFT, Left, movewindow, l
bind = SUPER SHIFT, Right, movewindow, r
bind = SUPER SHIFT, Up, movewindow, u
bind = SUPER SHIFT, Down, movewindow, d

# --- 4. Window Management & Layouts ---
bind = SUPER, Q, killactive
bind = ALT, F4, killactive

# Floating / Tiling toggles
bind = SUPER, V, togglefloating
bind = SUPER ALT, Space, togglefloating

# Fullscreen & Maximization toggles
bind = SUPER, F, fullscreen, 0
bind = SUPER, D, fullscreen, 1 # Maximize layout

# Pin floating windows
bind = SUPER, P, pin

# Adjusting split ratios in dwindle layout
binde = SUPER, Semicolon, layoutmsg, splitratio -0.1
binde = SUPER, Apostrophe, layoutmsg, splitratio +0.1

# --- 5. Workspace Grids (1 - 10) ---
# Raw keycodes are mapped to preserve layout-independent muscle memory (e.g. QWERTY / AZERTY)
# code:10 = 1, code:11 = 2, ..., code:19 = 0
bind = SUPER, code:10, workspace, 1
bind = SUPER, code:11, workspace, 2
bind = SUPER, code:12, workspace, 3
bind = SUPER, code:13, workspace, 4
bind = SUPER, code:14, workspace, 5
bind = SUPER, code:15, workspace, 6
bind = SUPER, code:16, workspace, 7
bind = SUPER, code:17, workspace, 8
bind = SUPER, code:18, workspace, 9
bind = SUPER, code:19, workspace, 10

# Move focused window silently to workspace
bind = SUPER ALT, code:10, movetoworkspacesilent, 1
bind = SUPER ALT, code:11, movetoworkspacesilent, 2
bind = SUPER ALT, code:12, movetoworkspacesilent, 3
bind = SUPER ALT, code:13, movetoworkspacesilent, 4
bind = SUPER ALT, code:14, movetoworkspacesilent, 5
bind = SUPER ALT, code:15, movetoworkspacesilent, 6
bind = SUPER ALT, code:16, movetoworkspacesilent, 7
bind = SUPER ALT, code:17, movetoworkspacesilent, 8
bind = SUPER ALT, code:18, movetoworkspacesilent, 9
bind = SUPER ALT, code:19, movetoworkspacesilent, 10

# Symmetrical Shift key bindings to move window and jump focus
bind = SUPER SHIFT, code:10, movetoworkspace, 1
bind = SUPER SHIFT, code:11, movetoworkspace, 2
bind = SUPER SHIFT, code:12, movetoworkspace, 3
bind = SUPER SHIFT, code:13, movetoworkspace, 4
bind = SUPER SHIFT, code:14, movetoworkspace, 5
bind = SUPER SHIFT, code:15, movetoworkspace, 6
bind = SUPER SHIFT, code:16, movetoworkspace, 7
bind = SUPER SHIFT, code:17, movetoworkspace, 8
bind = SUPER SHIFT, code:18, movetoworkspace, 9
bind = SUPER SHIFT, code:19, movetoworkspace, 10

# Relative workspace switching with Ctrl + Super
bind = SUPER CTRL, Right, workspace, r+1
bind = SUPER CTRL, Left, workspace, r-1

# --- 6. Special Workspace / Scratchpad ---
bind = SUPER, S, togglespecialworkspace
bind = SUPER ALT, S, movetoworkspacesilent, special

# --- 7. Mouse Actions ---
# Scroll through active workspaces with SUPER + wheel
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Drag and resize windows with mouse
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
