# Nook Shell - Gesture Configuration
# Native multi-finger workspace touchpad swipes.
# Compliant with modern Hyprland v0.51.0+ gesture directives.

# Direct gesture mapping: 3-finger horizontal swipe to switch workspaces
gesture = 3, horizontal, workspace

gestures {
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}
