# Nook Shell - Workspaces Configuration
# Custom rules, static assignments, and behaviors for dynamic workspaces.

# Assign workspaces to specific monitors (optional / environment specific)
# workspace = 1, monitor:eDP-1, default:true
# workspace = 2, monitor:eDP-1, default:true

# Custom workspace rules for smart layouts
# workspace = name:dev, rounding:false, gapsin:0, gapsout:0
# workspace = name:reading, gapsin:10, gapsout:20

# --- Smart Gaps (No gaps, no borders, no rounding when only one tiled window is open) ---
workspace = w[tv1], gapsout:0, gapsin:0

windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]

# --- Maximized State (Super+D restores gaps, borders, and rounding for single windows) ---
workspace = f[1], gapsout:8, gapsin:8
windowrule = border_size 2, match:float 0, match:workspace f[1]
windowrule = rounding 28, match:float 0, match:workspace f[1]

# --- Wallpaper Picker Floating Window Rules ---
windowrule = float 1, match:class ^(wallpaper-picker)$
windowrule = size 900 600, match:class ^(wallpaper-picker)$
windowrule = center 1, match:class ^(wallpaper-picker)$

