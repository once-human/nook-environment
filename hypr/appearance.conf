# Nook Shell - Appearance Configuration
# High-end desktop visuals: borders, colors, layouts, rounded corners, and blur.

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2

    # Sophisticated, restrained colors matching sleek dark mode aesthetics
    col.active_border = rgba(ffffff2b) rgba(ffffff0d) 45deg
    col.inactive_border = rgba(00000033)

    layout = dwindle
    
    resize_on_border = true
}

decoration {
    rounding = 12

    # Smooth subtle shadows for element depth using modern shadow block syntax
    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(00000033)
    }

    # Custom blur settings for glassmorphism
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = true
        noise = 0.01
        contrast = 0.9
        brightness = 0.8
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

# --- Compositor Layer Rules for Quickshell Blurs ---
layerrule {
    match = ^(nook-shelf-overlay|nook-topbar)$
    blur = true
    ignore_alpha = 0.2
}
