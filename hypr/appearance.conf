# Nook Shell - Appearance Configuration
# High-end desktop visuals: borders, colors, layouts, rounded corners, and blur.

general {
    gaps_in = 8
    gaps_out = 8
    border_size = 2

    # Restrained Nook charcoal ink borders for natural architectural containment
    col.active_border = rgba(2e2e2b14) rgba(2e2e2b05) 45deg
    col.inactive_border = rgba(2e2e2b05)

    layout = dwindle
    
    resize_on_border = true
}

decoration {
    # Inactive window dimming focus controls
    dim_inactive = true
    dim_strength = 0.25

    # Mathematically exact 28px equivalent superellipse (squircle) curvature
    rounding = 28
    rounding_power = 3.5

    # Deep premium drop shadows for beautiful window separation and depth (1.7x range and 2x opacity)
    shadow {
        enabled = true
        range = 48
        render_power = 3
        color = rgba(2e2e2b1e)
    }

    # Custom blur settings for glassmorphism
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = true
        noise = 0.01
        contrast = 0.9
        brightness = 0.8
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

# --- Compositor Layer Rules for Quickshell Blurs ---
layerrule {
    name = nook-shelf-overlay
    blur = true
    ignore_alpha = 0.2
}

# --- Compositor Miscellaneous Settings ---
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}
