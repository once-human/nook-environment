# Nook Shell - Master Hyprland Entrypoint
# This configuration is modularized to ensure system-level clarity, stability, and maintainability.

# --- Core Modules ---
source = ~/.config/nook/hypr/environment.conf
source = ~/.config/nook/hypr/input.conf
source = ~/.config/nook/hypr/gestures.conf
source = ~/.config/nook/hypr/appearance.conf
source = ~/.config/nook/hypr/animations.conf
source = ~/.config/nook/hypr/workspaces.conf
source = ~/.config/nook/hypr/keybinds.conf
source = ~/.config/nook/hypr/startup.conf

# --- User Overrides ---
source = ~/.config/nook/hypr/custom.conf
source = ~/.config/nook/hypr/colors.conf
