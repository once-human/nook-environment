# Nook Shell - Animation Configuration
# Premium, fluid motion with snappiness and ease-of-use.

animations {
    enabled = true

    # Custom bezier curves for smooth, premium physical feedback
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = easeOutBack, 0.34, 1.56, 0.64, 1
    bezier = fluent, 0.05, 0.9, 0.1, 1.0

    animation = windows, 1, 5, easeOutExpo, slide
    animation = windowsOut, 1, 4, easeOutExpo, slide
    animation = border, 1, 6, default
    animation = fade, 1, 4, easeOutExpo
    animation = workspaces, 1, 5, fluent, slide
}
