# Nook Shell - Startup Services
# Background services, status bars, and panels initiated on login.

# Launch Nook Shell Quickshell runtime (incorporating TopBar & Shelf)
exec-once = ~/.config/nook/scripts/nook-shell.sh

# Launch Waybar (uncommented to restore your regular black status bar)
exec-once = waybar -c ~/.config/nook/waybar/config.jsonc -s ~/.config/nook/waybar/style.css

# Launch wallpaper daemon (if present in environment)
exec-once = hyprpaper
